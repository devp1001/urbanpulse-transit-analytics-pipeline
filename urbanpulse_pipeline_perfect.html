
<!DOCTYPE html>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; font-family: sans-serif; padding: 12px; }
canvas { display: block; width: 100%; border-radius: 10px; }
.controls {
  display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center;
}
.btn {
  padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 12px; font-weight: 700; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.8; }
.btn-play  { background: #22c55e; color: #052e16; }
.btn-pause { background: #f59e0b; color: #1c1917; }
.btn-reset { background: #ef4444; color: #fff; }
.speed-btn {
  padding: 5px 10px; border-radius: 5px; border: 1px solid #475569;
  background: #1e293b; color: #cbd5e1; font-size: 11px; cursor: pointer;
}
.speed-btn.on { background: #3b82f6; border-color: #3b82f6; color: #fff; }
.info { color: #94a3b8; font-size: 11px; margin-left: auto; }
.info span { color: #e2e8f0; font-weight: 600; }
</style>

<div class="controls">
  <button class="btn btn-play" id="playBtn" onclick="togglePlay()">▶ Play</button>
  <button class="btn btn-reset" onclick="resetAll()">↺ Reset</button>
  <span style="color:#94a3b8;font-size:11px">Speed:</span>
  <button class="speed-btn on" id="sp1" onclick="setSpd(1,'sp1')">1×</button>
  <button class="speed-btn" id="sp2" onclick="setSpd(2,'sp2')">2×</button>
  <button class="speed-btn" id="sp3" onclick="setSpd(3,'sp3')">3×</button>
  <div class="info" id="info">Click ▶ Play to start</div>
</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const CW = 900, CH = 520;
canvas.width = CW; canvas.height = CH;

// ── NODE DEFINITIONS ──
const nodes = [
  { id:'mockgen', label:'Lambda',      sub:'Mock data gen',      x:60,  y:60,  w:110, h:52, color:'#065f46', stroke:'#34d399' },
  { id:'sqs',     label:'SQS',         sub:'Telemetry queue',    x:220, y:60,  w:110, h:52, color:'#78350f', stroke:'#fbbf24' },
  { id:'filter',  label:'Filter',      sub:'gps/passenger/fuel', x:390, y:60,  w:100, h:52, color:'#7f1d1d', stroke:'#f87171' },
  { id:'enrich',  label:'Lambda',      sub:'Enrich events',      x:500, y:60,  w:110, h:52, color:'#065f46', stroke:'#34d399' },
  { id:'writer',  label:'Lambda',      sub:'Write to S3',        x:620, y:60,  w:110, h:52, color:'#065f46', stroke:'#34d399' },
  { id:'s3raw',   label:'S3 Raw zone', sub:'year/mon/day/route', x:750, y:60,  w:130, h:52, color:'#1e3a5f', stroke:'#60a5fa' },
  { id:'crawraw', label:'Glue Crawler',sub:'Raw catalog',        x:750, y:200, w:130, h:52, color:'#3b0764', stroke:'#c084fc' },
  { id:'catraw',  label:'Data Catalog',sub:'Raw table',          x:590, y:200, w:130, h:52, color:'#3b0764', stroke:'#c084fc' },
  { id:'etl',     label:'Glue ETL Job',sub:'+ bookmarking',      x:420, y:200, w:130, h:52, color:'#134e4a', stroke:'#2dd4bf' },
  { id:'s3proc',  label:'S3 Processed',sub:'route/date parts',   x:250, y:200, w:130, h:52, color:'#1e3a5f', stroke:'#60a5fa' },
  { id:'crawprc', label:'Glue Crawler',sub:'Processed catalog',  x:250, y:340, w:130, h:52, color:'#3b0764', stroke:'#c084fc' },
  { id:'catprc',  label:'Data Catalog',sub:'Processed table',    x:420, y:340, w:130, h:52, color:'#3b0764', stroke:'#c084fc' },
  { id:'athena',  label:'Athena / BI', sub:'Query-ready',        x:590, y:340, w:130, h:52, color:'#1e293b', stroke:'#94a3b8' },
];

// ── EDGE DEFINITIONS: from → to, color, label ──
const edges = [
  { from:'mockgen', to:'sqs',     color:'#34d399', label:'events' },
  { from:'sqs',     to:'filter',  color:'#fbbf24', label:'poll' },
  { from:'filter',  to:'enrich',  color:'#f87171', label:'3 types' },
  { from:'enrich',  to:'writer',  color:'#34d399', label:'enriched' },
  { from:'writer',  to:'s3raw',   color:'#60a5fa', label:'JSON' },
  { from:'s3raw',   to:'crawraw', color:'#60a5fa', label:'lands' },
  { from:'crawraw', to:'catraw',  color:'#c084fc', label:'schema' },
  { from:'catraw',  to:'etl',     color:'#c084fc', label:'reads' },
  { from:'etl',     to:'s3proc',  color:'#2dd4bf', label:'summaries' },
  { from:'s3proc',  to:'crawprc', color:'#60a5fa', label:'lands' },
  { from:'crawprc', to:'catprc',  color:'#c084fc', label:'schema' },
  { from:'catprc',  to:'athena',  color:'#94a3b8', label:'query' },
];

function getNode(id) { return nodes.find(n => n.id === id); }
function cx(n) { return n.x + n.w/2; }
function cy(n) { return n.y + n.h/2; }

// Compute edge path as series of points (with right-angle routing for vertical drops)
function edgePath(e) {
  const a = getNode(e.from), b = getNode(e.to);
  const ax = cx(a), ay = cy(a), bx = cx(b), by = cy(b);

  // Vertical drop (same column roughly, y differs significantly)
  if (Math.abs(ax - bx) < 40 && Math.abs(ay - by) > 80) {
    // straight down from bottom of a to top of b
    return [
      { x: ax, y: a.y + a.h },
      { x: bx, y: b.y }
    ];
  }
  // Right-to-left on same row (stage 2 row 1 flows right-to-left)
  if (bx < ax && Math.abs(ay - by) < 40) {
    return [
      { x: a.x, y: ay },
      { x: b.x + b.w, y: by }
    ];
  }
  // Left-to-right same row
  if (bx > ax && Math.abs(ay - by) < 40) {
    return [
      { x: a.x + a.w, y: ay },
      { x: b.x, y: by }
    ];
  }
  // s3raw → crawraw: down then same x
  return [
    { x: ax, y: a.y + a.h },
    { x: bx, y: b.y }
  ];
}

// ── ANIMATION STATE ──
let packets = [];
let activeNode = null;
let playing = false;
let rafId = null;
let stepIdx = 0;
let stepTimer = null;
let spd = 1;
let lastTime = 0;

const stepLabels = [
  'Lambda generates 200+ bus telemetry events',
  'Events pushed into SQS telemetry queue',
  'EventBridge Pipe polls SQS and applies filter',
  'Enrichment Lambda adds shift_period & bus_category',
  'Writer Lambda formats and delivers to S3',
  'JSON records land in S3 Raw zone',
  'Glue Crawler scans raw zone, detects schema',
  'Data Catalog registers raw table + partitions',
  'Glue ETL Job reads catalog, aggregates route/date',
  'Summarized output written to S3 Processed zone',
  'Second Glue Crawler scans processed zone',
  'Data Catalog registers processed table',
  'Athena queries processed table — BI-ready ✓',
];

// Packet: travels along an edge path
class Packet {
  constructor(edgeIdx) {
    this.edgeIdx = edgeIdx;
    this.e = edges[edgeIdx];
    this.path = edgePath(this.e);
    this.t = 0; // 0→1
    this.speed = 0.012 * spd;
    this.color = this.e.color;
    this.done = false;
    this.trail = [];
  }
  update() {
    this.t += this.speed;
    if (this.t >= 1) { this.t = 1; this.done = true; }
    const pos = this.getPos(this.t);
    this.trail.push({x: pos.x, y: pos.y});
    if (this.trail.length > 18) this.trail.shift();
  }
  getPos(t) {
    const pts = this.path;
    if (pts.length === 2) {
      return {
        x: pts[0].x + (pts[1].x - pts[0].x) * t,
        y: pts[0].y + (pts[1].y - pts[0].y) * t
      };
    }
    return pts[0];
  }
  draw() {
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const alpha = (i / this.trail.length) * 0.5;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, 3, 0, Math.PI*2);
      ctx.fillStyle = this.color + Math.floor(alpha*255).toString(16).padStart(2,'0');
      ctx.fill();
    }
    // Head
    const pos = this.getPos(this.t);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 5, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ── DRAW ──
function drawNode(n, isActive) {
  const r = 8;
  // Shadow glow if active
  if (isActive) {
    ctx.shadowColor = n.stroke;
    ctx.shadowBlur = 18;
  }
  // Fill
  ctx.beginPath();
  ctx.roundRect(n.x, n.y, n.w, n.h, r);
  ctx.fillStyle = n.color;
  ctx.fill();
  // Border
  ctx.strokeStyle = isActive ? n.stroke : n.stroke + '99';
  ctx.lineWidth = isActive ? 2 : 1;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Label
  ctx.fillStyle = '#ffffff';
  ctx.font = '700 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(n.label, cx(n), n.y + 20);
  ctx.fillStyle = n.stroke + 'cc';
  ctx.font = '400 10px sans-serif';
  ctx.fillText(n.sub, cx(n), n.y + 35);
}

function drawEdge(e, isActive) {
  const pts = edgePath(e);
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.strokeStyle = isActive ? e.color : '#334155';
  ctx.lineWidth = isActive ? 2 : 1;
  ctx.setLineDash(isActive ? [] : [4,4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead at end
  const last = pts[pts.length-1];
  const prev = pts[pts.length-2];
  const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
  ctx.beginPath();
  ctx.moveTo(last.x, last.y);
  ctx.lineTo(last.x - 10*Math.cos(angle-0.4), last.y - 10*Math.sin(angle-0.4));
  ctx.lineTo(last.x - 10*Math.cos(angle+0.4), last.y - 10*Math.sin(angle+0.4));
  ctx.closePath();
  ctx.fillStyle = isActive ? e.color : '#475569';
  ctx.fill();

  // Edge label midpoint
  const mid = pts.length === 2
    ? { x: (pts[0].x+pts[1].x)/2, y: (pts[0].y+pts[1].y)/2 }
    : pts[1];
  ctx.fillStyle = isActive ? e.color : '#475569';
  ctx.font = '400 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(e.label, mid.x + (pts[0].y !== pts[1].y ? 14 : 0), mid.y + (pts[0].y !== pts[1].y ? 0 : -6));
}

function drawStageLabels() {
  ctx.font = '700 10px sans-serif';
  ctx.fillStyle = '#475569';
  ctx.textAlign = 'left';
  ctx.fillText('STAGE 1 — REAL-TIME INGESTION', 60, 28);
  ctx.fillText('STAGE 2 — BATCH PROCESSING & CATALOGING', 250, 170);

  // Stage 1 dashed container
  ctx.beginPath();
  ctx.roundRect(44, 38, CW - 88, 88, 12);
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  ctx.setLineDash([6,4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // EventBridge pipe sub-container
  ctx.beginPath();
  ctx.roundRect(378, 48, 368, 72, 8);
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,3]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#64748b';
  ctx.font = '400 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('EventBridge Pipe', 562, 44);
}

function render(ts) {
  ctx.clearRect(0, 0, CW, CH);

  drawStageLabels();

  // Draw all edges (dim)
  edges.forEach((e, i) => drawEdge(e, i < stepIdx));

  // Draw all nodes
  nodes.forEach(n => drawNode(n, n.id === activeNode));

  // Update & draw packets
  packets.forEach(p => { p.update(); p.draw(); });
  packets = packets.filter(p => !p.done);

  rafId = requestAnimationFrame(render);
}

// ── STEP SEQUENCER ──
function doStep() {
  if (stepIdx >= edges.length) {
    document.getElementById('info').innerHTML = '<span>✓ Pipeline complete!</span>';
    playing = false;
    document.getElementById('playBtn').textContent = '▶ Play';
    document.getElementById('playBtn').className = 'btn btn-play';
    return;
  }

  const e = edges[stepIdx];
  activeNode = e.from;
  document.getElementById('info').innerHTML =
    `Step ${stepIdx+1}/${edges.length}: <span>${stepLabels[stepIdx]}</span>`;

  // Launch packet
  packets.push(new Packet(stepIdx));

  // After packet crosses, advance
  const dur = Math.max(900, 1200 / spd);
  stepTimer = setTimeout(() => {
    activeNode = e.to;
    stepIdx++;
    if (playing) stepTimer = setTimeout(doStep, 400 / spd);
  }, dur);
}

function togglePlay() {
  const btn = document.getElementById('playBtn');
  if (!playing) {
    playing = true;
    btn.textContent = '⏸ Pause';
    btn.className = 'btn btn-pause';
    if (stepIdx >= edges.length) { stepIdx = 0; packets = []; activeNode = null; }
    doStep();
  } else {
    playing = false;
    btn.textContent = '▶ Play';
    btn.className = 'btn btn-play';
    clearTimeout(stepTimer);
  }
}

function resetAll() {
  playing = false;
  clearTimeout(stepTimer);
  stepIdx = 0; packets = []; activeNode = null;
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('playBtn').className = 'btn btn-play';
  document.getElementById('info').textContent = 'Click ▶ Play to start';
}

function setSpd(s, btnId) {
  spd = s;
  ['sp1','sp2','sp3'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.getElementById(btnId).classList.add('on');
}

// Start render loop
requestAnimationFrame(render);
</script>
